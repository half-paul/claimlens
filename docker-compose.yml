services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: factcheck
      POSTGRES_USER: factcheck
      POSTGRES_PASSWORD: factcheck
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factcheck -d factcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
